# version: '3.9'

services:

  # Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile          # Uses your "FROM php:8.2-fpm AS laravel-app"
    image: laravel-app               # You can name/tag the image if you want
    container_name: nds-app
    restart: unless-stopped
    tty: true
    # environment:
    #   SERVICE_NAME: "app"
    #   SERVICE_TAGS: "dev"
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./_php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mkassets_docker_network

  # Scheduler Service
  task-app-schedule:
    build:
      context: .
      dockerfile: scheduler.dockerfile  # Uses your second Dockerfile
    image: laravel-app-schedule
    command: ["php", "artisan", "schedule:work"]
    container_name: nds-app-schedule
    stop_signal: SIGTERM
    restart: unless-stopped
    tty: true
    volumes:
      - ./:/var/www
      - ./_php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mkassets_docker_network

  # Queue Worker Service - High Priority (Small/Fast Jobs)
  task-app-queue-default:
    build:
      context: .
      dockerfile: scheduler.dockerfile
    image: laravel-app-queue
    command: ["php", "artisan", "queue:work", "--queue=default,high", "--timeout=300", "--memory=256", "--sleep=1", "--tries=3", "--max-jobs=100", "--rest=5"]
    container_name: nds-app-queue-default
    stop_signal: SIGTERM
    restart: unless-stopped
    tty: true
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "-v", "grep", "|", "grep", "queue:work"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./:/var/www
      - ./_php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mkassets_docker_network

  # Queue Worker Service - Large Dataset Exports
  task-app-queue-exports:
    build:
      context: .
      dockerfile: scheduler.dockerfile
    image: laravel-app-queue-exports
    command: ["php", "artisan", "queue:work", "--queue=exports", "--timeout=7200", "--memory=1024", "--sleep=3", "--tries=2", "--max-jobs=1", "--rest=10"]
    container_name: nds-app-queue-exports
    stop_signal: SIGTERM
    restart: unless-stopped
    tty: true
    environment:
      - PHP_MEMORY_LIMIT=1536M
      - PHP_MAX_EXECUTION_TIME=7200
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "pgrep", "-f", "queue:work"]
      interval: 60s
      timeout: 30s
      retries: 2
      start_period: 60s
    volumes:
      - ./:/var/www
      - ./_php/export-worker.ini:/usr/local/etc/php/conf.d/export-worker.ini
    networks:
      - mkassets_docker_network

  # Queue Worker Service - Medium Priority Jobs
  task-app-queue-medium:
    build:
      context: .
      dockerfile: scheduler.dockerfile
    image: laravel-app-queue
    command: ["php", "artisan", "queue:work", "--queue=medium", "--timeout=900", "--memory=512", "--sleep=2", "--tries=3", "--max-jobs=50", "--rest=5"]
    container_name: nds-app-queue-medium
    stop_signal: SIGTERM
    restart: unless-stopped
    tty: true
    healthcheck:
      test: ["CMD", "pgrep", "-f", "queue:work"]
      interval: 45s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - ./:/var/www
      - ./_php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mkassets_docker_network

  # Nginx Webserver (behind reverse proxy)
  webserver:
    image: nginx:alpine
    container_name: nds-webserver
    restart: unless-stopped
    tty: true
    environment:
      - VIRTUAL_HOST=nds.mkassets.sk
      - LETSENCRYPT_HOST=nds.mkassets.sk
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - mkassets_docker_network

networks:
  mkassets_docker_network:
    external: true
