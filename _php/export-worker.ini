; PHP Configuration for Large Dataset Export Workers
; Optimized for memory-intensive CSV export operations

; Memory Management
memory_limit = 1536M
max_execution_time = 7200

; File Operations
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Database Connections  
default_socket_timeout = 300
mysql.connect_timeout = 300

; Output Buffering (disabled for streaming)
output_buffering = Off
implicit_flush = On

; Garbage Collection (aggressive for large datasets)
zend.enable_gc = On
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 0

; Error Reporting (production level)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
display_errors = Off

; Session (not needed for queue workers)
session.auto_start = 0

; Timezone
date.timezone = Europe/Berlin
