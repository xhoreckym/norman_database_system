openapi: 3.0.3
info:
  title: 'Norman Database System'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
paths:
  '/api/v1/empodat/{search_type}/{search_value}':
    get:
      summary: 'Search EMPODAT by substance or country'
      operationId: searchEMPODATBySubstanceOrCountry
      description: "Retrieve EMPODAT records by searching for a substance (NORMAN ID or InChIKey)\nor by country code. Results are paginated due to potentially large datasets."
      parameters:
        -
          in: query
          name: page
          description: 'The page number for pagination.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'The page number for pagination.'
            example: 1
            nullable: false
        -
          in: query
          name: per_page
          description: 'Number of records per page (max 1000, default 100).'
          example: 100
          required: false
          schema:
            type: integer
            description: 'Number of records per page (max 1000, default 100).'
            example: 100
            nullable: false
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      sampling_date_year: 2020
                      concentration_value: 0.0025
                      substance:
                        norman_id: NS00004453
                        name: Sulfaclozine
                      station:
                        name: 'Station A'
                        country:
                          code: SK
                          name: Slovakia
                      matrix:
                        name: 'Surface Water'
                  links:
                    first: ...
                    last: ...
                    prev: null
                    next: ...
                  meta:
                    current_page: 1
                    last_page: 50
                    per_page: 100
                    total: 5000
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        sampling_date_year: 2020
                        concentration_value: 0.0025
                        substance:
                          norman_id: NS00004453
                          name: Sulfaclozine
                        station:
                          name: 'Station A'
                          country:
                            code: SK
                            name: Slovakia
                        matrix:
                          name: 'Surface Water'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        sampling_date_year:
                          type: integer
                          example: 2020
                        concentration_value:
                          type: number
                          example: 0.0025
                        substance:
                          type: object
                          properties:
                            norman_id:
                              type: string
                              example: NS00004453
                            name:
                              type: string
                              example: Sulfaclozine
                        station:
                          type: object
                          properties:
                            name:
                              type: string
                              example: 'Station A'
                            country:
                              type: object
                              properties:
                                code:
                                  type: string
                                  example: SK
                                name:
                                  type: string
                                  example: Slovakia
                        matrix:
                          type: object
                          properties:
                            name:
                              type: string
                              example: 'Surface Water'
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: ...
                      last:
                        type: string
                        example: ...
                      prev:
                        type: string
                        example: null
                      next:
                        type: string
                        example: ...
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 50
                      per_page:
                        type: integer
                        example: 100
                      total:
                        type: integer
                        example: 5000
        404:
          description: 'Not Found'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Substance not found'
                  search_type: substance
                  search_value: NS99999999
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Substance not found'
                  search_type:
                    type: string
                    example: substance
                  search_value:
                    type: string
                    example: NS99999999
        422:
          description: 'Invalid Format'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    search_value:
                      - 'Substance must be a valid NORMAN ID or InChIKey.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      search_value:
                        type: array
                        example:
                          - 'Substance must be a valid NORMAN ID or InChIKey.'
                        items:
                          type: string
      tags:
        - EMPODAT
    parameters:
      -
        in: path
        name: search_type
        description: 'The type of search: "substance" or "country".'
        example: substance
        required: true
        schema:
          type: string
      -
        in: path
        name: search_value
        description: 'The search value. For substance: NS code (NS00000214) or InChIKey. For country: 2-letter ISO code (SK, DE).'
        example: NS00000214
        required: true
        schema:
          type: string
  '/api/v1/substances/code/{code}':
    get:
      summary: 'Get substance by NORMAN ID'
      operationId: getSubstanceByNORMANID
      description: "Retrieve a substance using its NORMAN identifier (e.g., NS00004453).\nReturns comprehensive substance data including chemical identifiers,\nmolecular properties, categories, and sources."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    norman_id: NS00004453
                    name: Sulfaclozine
                    name_dashboard: Sulfaclozine
                    name_iupac: 4-amino-N-(6-chloropyrazin-2-yl)benzenesulfonamide
                    cas_number: 102-65-8
                    smiles: c1cc(ccc1N)S(=O)(=O)Nc2cncc(n2)Cl
                    stdinchi: InChI=1S/C10H9ClN4O2S/...
                    stdinchikey: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
                    pubchem_cid: '66890'
                    molecular_formula: C10H9Cl1N4O2S1
                    monoisotopic_mass: 284.013474
                    status: active
                    categories:
                      -
                        name: Pharmaceuticals
                        abbreviation: PHAR
                    sources:
                      -
                        code: S01
                        name: 'NORMAN SLE'
                properties:
                  data:
                    type: object
                    properties:
                      norman_id:
                        type: string
                        example: NS00004453
                      name:
                        type: string
                        example: Sulfaclozine
                      name_dashboard:
                        type: string
                        example: Sulfaclozine
                      name_iupac:
                        type: string
                        example: 4-amino-N-(6-chloropyrazin-2-yl)benzenesulfonamide
                      cas_number:
                        type: string
                        example: 102-65-8
                      smiles:
                        type: string
                        example: c1cc(ccc1N)S(=O)(=O)Nc2cncc(n2)Cl
                      stdinchi:
                        type: string
                        example: InChI=1S/C10H9ClN4O2S/...
                      stdinchikey:
                        type: string
                        example: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
                      pubchem_cid:
                        type: string
                        example: '66890'
                      molecular_formula:
                        type: string
                        example: C10H9Cl1N4O2S1
                      monoisotopic_mass:
                        type: number
                        example: 284.013474
                      status:
                        type: string
                        example: active
                      categories:
                        type: array
                        example:
                          -
                            name: Pharmaceuticals
                            abbreviation: PHAR
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              example: Pharmaceuticals
                            abbreviation:
                              type: string
                              example: PHAR
                      sources:
                        type: array
                        example:
                          -
                            code: S01
                            name: 'NORMAN SLE'
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                              example: S01
                            name:
                              type: string
                              example: 'NORMAN SLE'
        404:
          description: 'Not Found'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Substance not found'
                  code: NS00004453
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Substance not found'
                  code:
                    type: string
                    example: NS00004453
        422:
          description: 'Invalid Format'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    code:
                      - 'The code must be in format NS followed by 8 digits (e.g., NS00004453).'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      code:
                        type: array
                        example:
                          - 'The code must be in format NS followed by 8 digits (e.g., NS00004453).'
                        items:
                          type: string
      tags:
        - Substances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: 'Must match the regex /^NS\d{8}$/.'
                  example: NS75491716
                  nullable: false
              required:
                - code
      security: []
    parameters:
      -
        in: path
        name: code
        description: 'The NORMAN substance ID with NS prefix.'
        example: NS00004453
        required: true
        schema:
          type: string
  '/api/v1/substances/inchikey/{inchikey}':
    get:
      summary: 'Get substance by InChIKey'
      operationId: getSubstanceByInChIKey
      description: "Retrieve a substance using its Standard InChIKey identifier.\nThe InChIKey must be in the standard 27-character format (e.g., QKLPUVXBJHRFQZ-UHFFFAOYSA-N)."
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    norman_id: NS00004453
                    name: Sulfaclozine
                    stdinchikey: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
                    status: active
                properties:
                  data:
                    type: object
                    properties:
                      norman_id:
                        type: string
                        example: NS00004453
                      name:
                        type: string
                        example: Sulfaclozine
                      stdinchikey:
                        type: string
                        example: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
                      status:
                        type: string
                        example: active
        404:
          description: 'Not Found'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Substance not found'
                  inchikey: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Substance not found'
                  inchikey:
                    type: string
                    example: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
        422:
          description: 'Invalid Format'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    inchikey:
                      - 'The InChIKey must be in valid format (e.g., QKLPUVXBJHRFQZ-UHFFFAOYSA-N).'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      inchikey:
                        type: array
                        example:
                          - 'The InChIKey must be in valid format (e.g., QKLPUVXBJHRFQZ-UHFFFAOYSA-N).'
                        items:
                          type: string
      tags:
        - Substances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inchikey:
                  type: string
                  description: 'Must match the regex /^[A-Z]{14}-[A-Z]{10}-[A-Z]$/.'
                  example: EQMDLNGZOPRSWW-XXPMRXFVPO-N
                  nullable: false
              required:
                - inchikey
      security: []
    parameters:
      -
        in: path
        name: inchikey
        description: 'The Standard InChIKey.'
        example: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
        required: true
        schema:
          type: string
tags:
  -
    name: EMPODAT
    description: "\nAPIs for retrieving environmental monitoring data from the EMPODAT database.\nAll endpoints require authentication via Sanctum token."
  -
    name: Substances
    description: "\nAPIs for retrieving substance data from the NORMAN Suspect List Exchange database."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: "**How to get your token:**\n1. Log in to the [NORMAN Database System](https://www.norman-network.com/nds/)\n2. Go to your **Dashboard** → **API Tokens**\n3. Click **Generate New Token**\n4. Copy the token (it will only be shown once!)\n\n**Your token looks like this:**\n```\n1|uQgwNnXHx7QJom31K8dfsdfsd8f7sd98f7sdf\n```\n\n---\n\n### \"Try It Out\" - What to paste in the Authorization field:\n\nCopy your **full token** and paste it in the Authorization box:\n```\n1|uQgwNnXHx7QJom31K8dfsdfsd8f7sd98f7sdf\n```\n(Scribe automatically adds \"Bearer \" prefix)\n\n---\n\n### Code Examples\n\n**curl:**\n```bash\ncurl -H \"Authorization: Bearer 1|uQgwNnXHx7QJom31...\" \\\n     \"https://www.norman-network.com/nds/api/v1/empodat/country/SK\"\n```\n\n**Python:**\n```python\nimport requests\n\nheaders = {\"Authorization\": \"Bearer 1|uQgwNnXHx7QJom31...\"}\nresponse = requests.get(\n    \"https://www.norman-network.com/nds/api/v1/empodat/country/SK\",\n    headers=headers\n)\n```\n\n**JavaScript:**\n```javascript\nfetch(\"https://www.norman-network.com/nds/api/v1/empodat/country/SK\", {\n    headers: { \"Authorization\": \"Bearer 1|uQgwNnXHx7QJom31...\" }\n})\n```"
security:
  -
    default: []
