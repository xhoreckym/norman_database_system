name: Substances
description: |-

  APIs for retrieving substance data from the NORMAN Suspect List Exchange database.
endpoints:
  -
    httpMethods:
      - GET
    uri: 'api/v1/substances/code/{code}'
    metadata:
      groupName: Substances
      groupDescription: |-

        APIs for retrieving substance data from the NORMAN Suspect List Exchange database.
      subgroup: ''
      subgroupDescription: ''
      title: 'Get substance by NORMAN ID'
      description: |-
        Retrieve a substance using its NORMAN identifier (e.g., NS00004453).
        Returns comprehensive substance data including chemical identifiers,
        molecular properties, categories, and sources.
      authenticated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      code:
        name: code
        description: 'The NORMAN substance ID with NS prefix.'
        required: true
        example: NS00004453
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanUrlParameters:
      code: NS00004453
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      code:
        name: code
        description: 'Must match the regex /^NS\d{8}$/.'
        required: true
        example: NS75491716
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanBodyParameters:
      code: NS75491716
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "data": {
              "norman_id": "NS00004453",
              "name": "Sulfaclozine",
              "name_dashboard": "Sulfaclozine",
              "name_iupac": "4-amino-N-(6-chloropyrazin-2-yl)benzenesulfonamide",
              "cas_number": "102-65-8",
              "smiles": "c1cc(ccc1N)S(=O)(=O)Nc2cncc(n2)Cl",
              "stdinchi": "InChI=1S/C10H9ClN4O2S/...",
              "stdinchikey": "QKLPUVXBJHRFQZ-UHFFFAOYSA-N",
              "pubchem_cid": "66890",
              "molecular_formula": "C10H9Cl1N4O2S1",
              "monoisotopic_mass": 284.013474,
              "status": "active",
              "categories": [{"name": "Pharmaceuticals", "abbreviation": "PHAR"}],
              "sources": [{"code": "S01", "name": "NORMAN SLE"}]
            }
          }
        headers: []
        description: Success
        custom: []
      -
        status: 404
        content: |-
          {
            "success": false,
            "message": "Substance not found",
            "code": "NS00004453"
          }
        headers: []
        description: 'Not Found'
        custom: []
      -
        status: 422
        content: |-
          {
            "success": false,
            "message": "Validation failed",
            "errors": {"code": ["The code must be in format NS followed by 8 digits (e.g., NS00004453)."]}
          }
        headers: []
        description: 'Invalid Format'
        custom: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - GET
    uri: 'api/v1/substances/inchikey/{inchikey}'
    metadata:
      groupName: Substances
      groupDescription: |-

        APIs for retrieving substance data from the NORMAN Suspect List Exchange database.
      subgroup: ''
      subgroupDescription: ''
      title: 'Get substance by InChIKey'
      description: |-
        Retrieve a substance using its Standard InChIKey identifier.
        The InChIKey must be in the standard 27-character format (e.g., QKLPUVXBJHRFQZ-UHFFFAOYSA-N).
      authenticated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      inchikey:
        name: inchikey
        description: 'The Standard InChIKey.'
        required: true
        example: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanUrlParameters:
      inchikey: QKLPUVXBJHRFQZ-UHFFFAOYSA-N
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      inchikey:
        name: inchikey
        description: 'Must match the regex /^[A-Z]{14}-[A-Z]{10}-[A-Z]$/.'
        required: true
        example: EQMDLNGZOPRSWW-XXPMRXFVPO-N
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanBodyParameters:
      inchikey: EQMDLNGZOPRSWW-XXPMRXFVPO-N
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "data": {
              "norman_id": "NS00004453",
              "name": "Sulfaclozine",
              "stdinchikey": "QKLPUVXBJHRFQZ-UHFFFAOYSA-N",
              "status": "active"
            }
          }
        headers: []
        description: Success
        custom: []
      -
        status: 404
        content: |-
          {
            "success": false,
            "message": "Substance not found",
            "inchikey": "QKLPUVXBJHRFQZ-UHFFFAOYSA-N"
          }
        headers: []
        description: 'Not Found'
        custom: []
      -
        status: 422
        content: |-
          {
            "success": false,
            "message": "Validation failed",
            "errors": {"inchikey": ["The InChIKey must be in valid format (e.g., QKLPUVXBJHRFQZ-UHFFFAOYSA-N)."]}
          }
        headers: []
        description: 'Invalid Format'
        custom: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
    custom: []
