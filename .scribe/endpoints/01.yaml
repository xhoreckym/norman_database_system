name: EMPODAT
description: |-

  APIs for retrieving environmental monitoring data from the EMPODAT database.
  All endpoints require authentication via Sanctum token.
endpoints:
  -
    httpMethods:
      - GET
    uri: 'api/v1/empodat/{search_type}/{search_value}'
    metadata:
      groupName: EMPODAT
      groupDescription: |-

        APIs for retrieving environmental monitoring data from the EMPODAT database.
        All endpoints require authentication via Sanctum token.
      subgroup: ''
      subgroupDescription: ''
      title: 'Search EMPODAT by substance or country'
      description: |-
        Retrieve EMPODAT records by searching for a substance (NORMAN ID or InChIKey)
        or by country code. Results are paginated due to potentially large datasets.
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer 1|your_token_here'
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      search_type:
        name: search_type
        description: 'The type of search: "substance" or "country".'
        required: true
        example: substance
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      search_value:
        name: search_value
        description: 'The search value. For substance: NS code (NS00000214) or InChIKey. For country: 2-letter ISO code (SK, DE).'
        required: true
        example: NS00000214
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanUrlParameters:
      search_type: substance
      search_value: NS00000214
    queryParameters:
      page:
        name: page
        description: 'The page number for pagination.'
        required: false
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      per_page:
        name: per_page
        description: 'Number of records per page (max 1000, default 100).'
        required: false
        example: 100
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanQueryParameters:
      page: 1
      per_page: 100
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "data": [
              {
                "id": 1,
                "sampling_date_year": 2020,
                "concentration_value": 0.0025,
                "substance": {"norman_id": "NS00004453", "name": "Sulfaclozine"},
                "station": {"name": "Station A", "country": {"code": "SK", "name": "Slovakia"}},
                "matrix": {"name": "Surface Water"}
              }
            ],
            "links": {"first": "...", "last": "...", "prev": null, "next": "..."},
            "meta": {"current_page": 1, "last_page": 50, "per_page": 100, "total": 5000}
          }
        headers: []
        description: Success
        custom: []
      -
        status: 404
        content: |-
          {
            "success": false,
            "message": "Substance not found",
            "search_type": "substance",
            "search_value": "NS99999999"
          }
        headers: []
        description: 'Not Found'
        custom: []
      -
        status: 422
        content: |-
          {
            "success": false,
            "message": "Validation failed",
            "errors": {"search_value": ["Substance must be a valid NORMAN ID or InChIKey."]}
          }
        headers: []
        description: 'Invalid Format'
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6ak3gE5VfD6Pbhda1c4Zve8'
    controller: null
    method: null
    route: null
    custom: []
